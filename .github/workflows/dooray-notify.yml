- name: Send Dooray Notification
        if: always() # 성공하든 실패하든 항상 실행하려면 추가 (원하는 조건에 맞춰 변경)
        run: |
          # 빌드 상태에 따라 색상과 메시지 분기 (옵션)
          if [ "${{ job.status }}" = "success" ]; then
            COLOR="green"
            TITLE="✅ GitHub Actions 배포 성공"
          else
            COLOR="red"
            TITLE="❌ GitHub Actions 배포 실패"
          fi
          # Dooray JSON 페이로드 구성 및 전송
          curl -s -X POST "${{ secrets.DOORAY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"botName\": \"GitHub Bot\",
              \"botIconImage\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\",
              \"text\": \"\",
              \"attachments\": [
                {
                  \"title\": \"$TITLE\",
                  \"text\": \"저장소: ${{ github.repository }}\n커밋: ${{ github.sha }}\n실행자: ${{ github.actor }}\",
                  \"color\": \"$COLOR\"
                }
              ]
            }"