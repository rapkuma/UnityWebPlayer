name: Send Dooray Notification
# 언제 이 알림을 실행할지 결정 (예: master 브랜치에 코드가 푸시되었을 때)
on:
  push:
    branches:
      - master
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Dooray Webhook
        run: |
          curl -s -X POST "${{ secrets.DOORAY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "botName": "GitHub Actions",
              "text": "🚀 GitHub Pages에 새로운 배포가 완료되었습니다!",
              "attachments": [
                {
                  "title": "저장소: ${{ github.repository }}",
                  "text": "새로운 버전이 GitHub에 성공적으로 Push 되었습니다.\n커밋 해시: ${{ github.sha }}",
                  "color": "green"
                }
              ]
            }'