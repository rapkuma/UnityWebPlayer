name: Send Dooray Notification
on:
  push:
    branches:
      - master
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Dooray Webhook
        run: |
          # 저장소 이름과 소유자명을 자동으로 분리해서 GitHub Pages URL 완성
          REPO_NAME=${GITHUB_REPOSITORY#*/}
          OWNER=${GITHUB_REPOSITORY_OWNER}
          PAGES_URL="https://${OWNER}.github.io/${REPO_NAME}"
          
          # Dooray로 JSON 데이터 전송
          curl -s -X POST "${{ secrets.DOORAY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"botName\": \"GitHub Actions\",
              \"text\": \"\",
              \"attachments\": [
                {
                  \"title\": \"✅ GitHub Pages 배포 완료\",
                  \"titleLink\": \"$PAGES_URL\",
                  \"text\": \"새로운 웹빌드가 성공적으로 배포 되었습니다!\n\n🎮 Publish Site:\n$PAGES_URL\",
                  \"color\": \"green\"
                }
              ]
            }"
